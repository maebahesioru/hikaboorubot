# Coolify 用 docker-compose.yml
# hikabooru → X ランダムメディア投稿 bot
#
# COOKIE_JSON 環境変数にブラウザエクスポートCookieのJSON内容を設定

services:
  hikabooru-x-poster:
    build: .
    container_name: hikabooru-x-poster
    restart: unless-stopped
    environment:
      - TZ=Asia/Tokyo
      - COOKIE_JSON=${COOKIE_JSON:-}
    command:
      - "/bin/sh"
      - "-c"
      - |
        mkdir -p /app/data
        echo "$${COOKIE_JSON}" > /app/data/cookie.json
        exec python3 hikabooru_x_poster.py --cookie /app/data/cookie.json --interval 900
