# Coolify 用 docker-compose.yml
# hikabooru → X ランダムメディア投稿 bot
#
# デプロイ: Coolify Docker Compose Application
# cookie.json は同一リポジトリの data/ から読み込み

services:
  hikabooru-x-poster:
    build: .
    container_name: hikabooru-x-poster
    restart: unless-stopped
    environment:
      - TZ=Asia/Tokyo
    command:
      - "python3"
      - "hikabooru_x_poster.py"
      - "--cookie"
      - "/app/data/cookie.json"
      - "--interval"
      - "900"
