# Coolify 用 docker-compose.yml
# hikabooru → X + Misskey マルチ投稿 bot
# X: 30分間隔 / Misskey: 5分間隔

services:
  hikabooru-x-poster:
    build: .
    container_name: hikabooru-x-poster
    restart: unless-stopped
    environment:
      - TZ=Asia/Tokyo
      - COOKIE_JSON=${COOKIE_JSON:-}
      - MISSKEY_TOKEN=${MISSKEY_TOKEN}
    command:
      - "/bin/sh"
      - "-c"
      - |
        mkdir -p /app/data
        echo "$${COOKIE_JSON}" > /app/data/cookie.json
        exec python3 hikabooru_x_poster.py \
          --cookie /app/data/cookie.json \
          --x-interval 1800 \
          --misskey-interval 300 \
          --misskey-token "$${MISSKEY_TOKEN}"
